<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A97E2F"/>
      <stop offset="55%" stop-color="#D4A94A"/>
      <stop offset="100%" stop-color="#F3D68B"/>
    </linearGradient>
  </defs>
  <!-- Solid --bg-raised tile + gradient-filled "b": chosen over the gradient-tile/white-"b"
       direction because the white letter loses contrast against the gradient's lighter
       mid-tones at 16px (illegible blob). This solid-tile/gradient-glyph composition reads
       clearly at 16px through 512px, so it's used across the whole asset set for consistency. -->
  <rect x="0" y="0" width="512" height="512" rx="113" fill="#101830"/>
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="central"
        font-family="Fraunces, Georgia, 'Times New Roman', serif" font-weight="900"
        font-size="420" letter-spacing="-10" fill="url(#g)">b</text>
</svg>
